<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Planner | Professional Edition</title>
    <style>
        :root {
            --primary: #1e272e;
            --accent: #ffa801;
            --success: #05c46b;
            --bg: #f1f2f6;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--primary); }

        /* --- SPLASH SCREEN --- */
        #splash {
            position: fixed; width: 100%; height: 100vh; background: var(--primary);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10000; color: white; transition: 0.8s;
        }
        .loader-bar { width: 250px; height: 4px; background: #333; margin-top: 20px; position: relative; overflow: hidden; }
        .loader-bar::after { content: ''; width: 100px; height: 4px; background: var(--accent); position: absolute; animation: load 2s infinite; }
        @keyframes load { 0% { left: -100px; } 100% { left: 250px; } }

        /* --- AUTHENTICATION --- */
        #auth-gate { display: none; height: 100vh; background: #2f3542; justify-content: center; align-items: center; }
        .auth-card { background: white; padding: 40px; border-radius: 15px; width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        /* --- MAIN LAYOUT --- */
        #main-app { display: none; }
        nav { background: var(--primary); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        nav .links a { color: white; text-decoration: none; margin-left: 20px; font-weight: bold; cursor: pointer; }
        nav .links a:hover { color: var(--accent); }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .step { display: none; animation: fadeIn 0.5s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- UI COMPONENTS --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 2px solid transparent; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 160px; object-fit: cover; }
        .card-info { padding: 15px; }
        
        .btn { padding: 12px 30px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; background: var(--accent); color: white; margin-top: 20px; }
        .btn-secondary { background: #7f8c8d; }

        /* --- HISTORY VIEW --- */
        .history-item { background: white; padding: 20px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid var(--success); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* --- RESPONSIVE DROPDOWNS --- */
        .input-group { margin-bottom: 25px; background: white; padding: 20px; border-radius: 10px; }
        select, input { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="splash">
        <h1 style="letter-spacing: 12px;">TRAVEL PLANNER</h1>
        <p>Your Journey, Our Logic.</p>
        <div class="loader-bar"></div>
    </div>

    <div id="auth-gate">
        <div class="auth-card">
            <h2 style="margin-bottom:20px; color: var(--primary);">Secure Portal</h2>
            <input type="text" id="username" placeholder="Full Name">
            <input type="password" placeholder="Passcode">
            <button class="btn" style="width:100%;" onclick="launchApp()">Access Account</button>
        </div>
    </div>

    <div id="main-app">
        <nav>
            <h2 onclick="showStep(1)" style="cursor:pointer;">Travel<span>Planner</span></h2>
            <div class="links">
                <a onclick="showStep(1)">New Plan</a>
                <a onclick="loadHistory()">Travel History</a>
                <a href="#" onclick="location.reload()">Logout</a>
            </div>
        </nav>

        <div class="container">
            
            <div id="step1" class="step active">
                <div class="input-group">
                    <h2>Step 1: Route Setup</h2>
                    <div style="display:flex; gap:20px; margin-top:15px;">
                        <div style="flex:1;">
                            <label>Origin City:</label>
                            <input type="text" id="origin-city" placeholder="e.g. Bangalore">
                        </div>
                        <div style="flex:1;">
                            <label>Destination Focus:</label>
                            <select id="state-filter" onchange="renderStates()">
                                <option value="all">View All 15 States</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="grid" id="state-grid"></div>
            </div>

            <div id="step2" class="step">
                <h2>Step 2: Choose Transportation</h2>
                <div class="grid" id="transport-grid"></div>
                <button class="btn btn-secondary" onclick="showStep(1)">Back</button>
            </div>

            <div id="step3" class="step">
                <h2>Step 3: Choose Accommodation</h2>
                <div class="grid" id="hotel-grid"></div>
                <button class="btn btn-secondary" onclick="showStep(2)">Back</button>
            </div>

            <div id="step4" class="step">
                <h2>Step 4: Dining & Experience</h2>
                <div class="grid" id="food-grid"></div>
                <button class="btn btn-secondary" onclick="showStep(3)">Back</button>
            </div>

            <div id="step5" class="step">
                <h2>Confirm Your Selection</h2>
                <div id="final-summary" style="background:white; padding:30px; border-radius:15px; margin-top:20px;"></div>
                <button class="btn" style="background:var(--success); width:100%;" onclick="saveToHistory()">Finalize & Save to Account</button>
            </div>

            <div id="step-history" class="step">
                <h2>Your Travel History</h2>
                <div id="history-list" style="margin-top:20px;">
                    </div>
                <button class="btn btn-secondary" onclick="showStep(1)">Start New Plan</button>
            </div>

        </div>
    </div>

    <script>
        // --- EXPANDED DATASET ---
        const states = [
            { name: "Karnataka", img: "https://images.unsplash.com/photo-1600100397608-f09074aa86bc?w=400", cost: 4000 },
            { name: "Rajasthan", img: "https://images.unsplash.com/photo-1477587458883-47145ed94245?w=400", cost: 5500 },
            { name: "Kerala", img: "https://images.unsplash.com/photo-1602216056096-3b40cc0c9944?w=400", cost: 5000 },
            { name: "Goa", img: "https://images.unsplash.com/photo-1512343879784-a960bf40e7f2?w=400", cost: 7000 },
            { name: "Tamil Nadu", img: "https://images.unsplash.com/photo-1582510003544-4d00b7f74220?w=400", cost: 4500 },
            { name: "Maharashtra", img: "https://images.unsplash.com/photo-1566552881560-0be862a7c445?w=400", cost: 5000 },
            { name: "Himachal", img: "https://images.unsplash.com/photo-1626621341517-bbf3d9990a23?w=400", cost: 6500 },
            { name: "Uttarakhand", img: "https://images.unsplash.com/photo-1584128676227-62b4b3841401?w=400", cost: 6000 },
            { name: "Gujarat", img: "https://images.unsplash.com/photo-1599933334292-06363ad79969?w=400", cost: 4800 },
            { name: "Assam", img: "https://images.unsplash.com/photo-1623945227418-291f6f6ac299?w=400", cost: 5200 },
            { name: "Punjab", img: "https://images.unsplash.com/photo-1514222134-b57cbb8ce073?w=400", cost: 4200 },
            { name: "Odisha", img: "https://images.unsplash.com/photo-1599424423943-469b73656608?w=400", cost: 4000 },
            { name: "Sikkim", img: "https://images.unsplash.com/photo-1570654639102-bdd947ec9455?w=400", cost: 6000 },
            { name: "Meghalaya", img: "https://images.unsplash.com/photo-1500614922032-b6dd337b1313?w=400", cost: 5800 },
            { name: "Andhra Pradesh", img: "https://images.unsplash.com/photo-1621319339232-959827c1f802?w=400", cost: 4400 }
        ];

        const transports = [
            { name: "Premium Flight", img: "https://images.unsplash.com/photo-1436491865332-7a61a109c0f3?w=400", cost: 5000 },
            { name: "Tejas Express", img: "https://images.unsplash.com/photo-1590644365607-1c5a519a7a37?w=400", cost: 1500 },
            { name: "Luxury Volvo Bus", img: "https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?w=400", cost: 1200 },
            { name: "Private SUV", img: "https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?w=400", cost: 3500 },
            { name: "Vande Bharat", img: "https://images.unsplash.com/photo-1474487022152-52bc3358df44?w=400", cost: 1800 },
            { name: "Car Rental (Self)", img: "https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=400", cost: 2500 },
            { name: "Sleeper Class", img: "https://images.unsplash.com/photo-1550854495-231362095988?w=400", cost: 600 },
            { name: "Charter Helicopter", img: "https://images.unsplash.com/photo-1544026367-1707d5830953?w=400", cost: 25000 },
            { name: "Luxury Yacht", img: "https://images.unsplash.com/photo-1567899378494-47b22a2ae96a?w=400", cost: 15000 },
            { name: "Standard Taxi", img: "https://images.unsplash.com/photo-1549421263-5ec394a5ad4c?w=400", cost: 2000 }
        ];

        const hotels = [
            { name: "Taj Mahal Palace", img: "https://images.unsplash.com/photo-1566073771259-6a8506099945?w=400", cost: 10000 },
            { name: "The Marriott Grand", img: "https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=400", cost: 7000 },
            { name: "Hilton Executive", img: "https://images.unsplash.com/photo-1564501049412-61c2a3083791?w=400", cost: 5500 },
            { name: "Heritage Boutique", img: "https://images.unsplash.com/photo-1596394516093-501ba68a0ba6?w=400", cost: 4000 },
            { name: "Beachside Villa", img: "https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?w=400", cost: 8500 },
            { name: "Mountain Cabin", img: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=400", cost: 3000 },
            { name: "Urban Loft", img: "https://images.unsplash.com/photo-1554995207-c18c203602cb?w=400", cost: 2500 },
            { name: "Eco Lodge", img: "https://images.unsplash.com/photo-1510798831971-661eb04b3739?w=400", cost: 2000 },
            { name: "Hostel World", img: "https://images.unsplash.com/photo-1555854877-bab0e564b8d5?w=400", cost: 800 },
            { name: "Capsule Stay", img: "https://images.unsplash.com/photo-1553531384-cc64ac80f931?w=400", cost: 1200 }
        ];

        const restaurants = [
            { name: "Michelin Fine Dine", img: "https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=400", cost: 4000 },
            { name: "Traditional Thali", img: "https://images.unsplash.com/photo-1546833999-b9f581a1996d?w=400", cost: 800 },
            { name: "Sky Garden Café", img: "https://images.unsplash.com/photo-1559339352-11d035aa65de?w=400", cost: 2000 },
            { name: "The Seafood Grill", img: "https://images.unsplash.com/photo-1552566626-52f8b828add9?w=400", cost: 1800 },
            { name: "Pasta & Wine House", img: "https://images.unsplash.com/photo-1551183053-bf91a1d81141?w=400", cost: 2500 },
            { name: "Street Food Tour", img: "https://images.unsplash.com/photo-1565557623262-b51c2513a641?w=400", cost: 500 },
            { name: "Fusion Bistro", img: "https://images.unsplash.com/photo-1544148103-0773bf10d330?w=400", cost: 1400 },
            { name: "Organic Farm Kitchen", img: "https://images.unsplash.com/photo-1502301103665-0b95cc738def?w=400", cost: 1200 },
            { name: "Budget Tiffin Center", img: "https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=400", cost: 300 },
            { name: "Retro Diner", img: "https://images.unsplash.com/photo-1550966841-3ee7adac1afb?w=400", cost: 900 }
        ];

        let selection = { origin: '', state: null, transport: null, hotel: null, food: null };
        let travelHistory = [];

        // --- CORE LOGIC ---
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('auth-gate').style.display = 'flex';
            }, 800);
        }, 5000);

        function launchApp() {
            const user = document.getElementById('username').value;
            if(!user) return alert("Enter Name");
            document.getElementById('auth-gate').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            renderStates();
        }

        function showStep(num) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            if(num === 'history') document.getElementById('step-history').classList.add('active');
            else document.getElementById('step' + num).classList.add('active');
        }

        function renderGrid(containerId, dataArray, selectionKey, nextStepNum) {
            const grid = document.getElementById(containerId);
            grid.innerHTML = '';
            dataArray.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${item.img}"><div class="card-info"><h3>${item.name}</h3><p>Rate: ₹${item.cost}</p></div>`;
                card.onclick = () => {
                    selection[selectionKey] = item;
                    if(selectionKey === 'state') selection.origin = document.getElementById('origin-city').value;
                    goToNext(nextStepNum);
                };
                grid.appendChild(card);
            });
        }

        function goToNext(num) {
            if(num === 2) renderGrid('transport-grid', transports, 'transport', 3);
            if(num === 3) renderGrid('hotel-grid', hotels, 'hotel', 4);
            if(num === 4) renderGrid('food-grid', restaurants, 'food', 5);
            if(num === 5) showSummary();
            showStep(num);
        }

        function renderStates() { renderGrid('state-grid', states, 'state', 2); }

        function showSummary() {
            const total = selection.state.cost + selection.transport.cost + selection.hotel.cost + selection.food.cost;
            document.getElementById('final-summary').innerHTML = `
                <h3>Final Itinerary</h3>
                <p><strong>Route:</strong> ${selection.origin || 'Not specified'} to ${selection.state.name}</p>
                <p><strong>Travel:</strong> ${selection.transport.name}</p>
                <p><strong>Stay:</strong> ${selection.hotel.name}</p>
                <p><strong>Food:</strong> ${selection.food.name}</p>
                <h1 style="color:var(--success); margin-top:15px;">Total Cost: ₹${total.toLocaleString()}</h1>
            `;
        }

        function saveToHistory() {
            travelHistory.push({...selection, date: new Date().toLocaleDateString()});
            alert("Travel Plan Finalized and saved to your history!");
            loadHistory();
        }

        function loadHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = travelHistory.length === 0 ? "<p>No past travels found.</p>" : "";
            travelHistory.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <h3>${item.state.name} Trip (${item.date})</h3>
                    <p>${item.origin} → ${item.state.name} | ${item.transport.name} | ${item.hotel.name}</p>
                `;
                list.appendChild(div);
            });
            showStep('history');
        }
    </script>
</body>
</html>
